matcherConfig:
  exactMatch: true
  labelMatchers:
    - [self-hosted, ce, win-builder]
fifo: true
delay_webhook_event: 0
runner_config:
  runner_os: windows
  runner_architecture: x64
  runner_extra_labels: [ce]
  runner_name_prefix: ce-win-builder_
  enable_ssm_on_runners: true
  ami:
    filter:
      name:
        - github-runner-win-builder-*
      state:
        - available
    owners:
      - "052730242331"
  enable_userdata: false
  instance_types:
    # Newer generations (memory-optimized, 32 GiB) — preferred
    - r7a.xlarge        # AMD Zen4 (Genoa)
    - r7i.xlarge        # Intel Sapphire Rapids
    - r7iz.xlarge       # Intel Sapphire Rapids (high-frequency)
    # Older generations retained for spot-capacity diversity (local NVMe)
    - r6id.xlarge       # Intel Ice Lake
    - r5ad.xlarge       # AMD EPYC
    - r5d.xlarge        # Intel
    - r5dn.xlarge       # Intel (network-optimized)
  # Windows builders run on spot (the module default): unlike the Linux x64 tiers
  # (kept on-demand because we need them frequently and they hold up when capacity
  # is tight), Windows builds are infrequent enough to tolerate the occasional
  # spot interruption in exchange for the saving.
  instance_target_capacity_type: spot
  block_device_mappings:
    - device_name: /dev/sda1
      delete_on_termination: true
      volume_type: gp3
      volume_size: 128
      encrypted: true
      # Windows library builds are I/O-heavy; lift the gp3 volume above the
      # 3000 IOPS / 125 MB/s baseline. Volume is ephemeral (deleted on
      # termination) so the extra cost only applies while a builder runs.
      iops: 6000
      throughput: 250
      kms_key_id: null
      snapshot_id: null
  runners_maximum_count: 16
  enable_ephemeral_runners: false
  instance_allocation_strategy: price-capacity-optimized
  create_service_linked_role_spot: true
  runner_boot_time_in_minutes: 20
  scale_down_schedule_expression: cron(* * * * ? *)
  runner_metadata_options:
    instance_metadata_tags: enabled
    http_endpoint: enabled
    http_tokens: required
    http_put_response_hop_limit: 1
